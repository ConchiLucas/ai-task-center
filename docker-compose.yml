services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-task-center-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_task_center
      POSTGRES_USER: conchi
      POSTGRES_PASSWORD: conchi123456
      TZ: Asia/Shanghai
    ports:
      - "55432:5432"
    network_mode: bridge
    volumes:
      - ai_task_center_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conchi -d ai_task_center"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  ai_task_center_pgdata:
